<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OpenWrt 网络实验</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- Chart.js 轻量图表库，CDN 引入，无需本地安装 -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <header class="topbar">
    <h1>OpenWrt 网络应用实验</h1>
    <nav>
      <button id="trafficTab" class="active" type="button">流量监控</button>
      <button id="firewallTab" type="button">防火墙配置</button>
    </nav>
  </header>

  <main>
    <!-- ========== 流量监控页面 ========== -->
    <section id="trafficView" class="view active">
      <div class="section-head">
        <h2>实时流量</h2>
        <span id="trafficStatus">等待连接</span>
      </div>

      <!-- 发送速率图 -->
      <div class="chart-container">
        <canvas id="sendChart"></canvas>
      </div>

      <!-- 接收速率图 -->
      <div class="chart-container">
        <canvas id="recvChart"></canvas>
      </div>

      <!-- 流量表格 -->
      <table>
        <thead>
          <tr>
            <th>源 IP</th>
            <th>目的 IP</th>
            <th>协议</th>
            <th>累计流量</th>
            <th>峰值速率</th>
            <th>2s 平均</th>
            <th>10s 平均</th>
            <th>40s 平均</th>
          </tr>
        </thead>
        <tbody id="trafficTableBody">
          <tr>
            <td colspan="8">暂无数据</td>
          </tr>
        </tbody>
      </table>
    </section>

    <!-- ========== 防火墙配置页面 ========== -->
    <section id="firewallView" class="view">
      <div class="section-head">
        <h2>防火墙规则</h2>
        <span id="firewallStatus">未执行操作</span>
      </div>
      <form id="firewallForm">
        <label>
          协议
          <select name="protocol">
            <option value="tcp">TCP</option>
            <option value="udp">UDP</option>
            <option value="icmp">ICMP</option>
            <option value="all">ALL</option>
          </select>
        </label>
        <label>
          源地址
          <input name="src_ip" placeholder="0.0.0.0/0">
        </label>
        <label>
          目的地址
          <input name="dst_ip" placeholder="8.8.8.8">
        </label>
        <label>
          端口
          <input name="port" placeholder="80">
        </label>
        <label>
          动作
          <select name="action">
            <option value="accept">accept</option>
            <option value="reject">reject</option>
            <option value="drop">drop</option>
          </select>
        </label>
        <button type="submit">新增规则</button>
      </form>
      <pre id="firewallOutput">规则列表将在这里显示。</pre>
    </section>
  </main>

  <script src="js/traffic.js"></script>
  <script src="js/firewall.js"></script>
</body>
</html>
